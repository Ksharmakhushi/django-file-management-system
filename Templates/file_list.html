<h2>Uploaded Files</h2>

<table border="1" cellpadding="10">

    <tr>
        <th>S.No</th>
        <th>Title</th>
        <th>Preview</th>
        <th>File</th>
        <th>Action</th>
    </tr>


    {% for i in files %}

    <tr>
        <td>{{ forloop.counter }}</td>

        <td>{{ i.title }}</td>

        <td>
            <img src="{{ i.file.url }}" width="100" height="100">
        </td>

        <td>
            <a href="{{ i.file.url }}" target="_blank">
                Open File
            </a>
        </td>

        <td>
            <a href="{% url 'download' i.id %}">
                Download
            </a>
        </td>
    </tr>


    {% endfor %}

</table>
